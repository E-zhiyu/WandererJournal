name: ManagerAssistant Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 从 Secrets 还原签名文件
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建已签名的 APK
      # 我们通过 -P 参数将 Secrets 中的值直接注入 Gradle 属性
      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 重命名 APK
      - name: Rename APK
        run: |
          # 1. 定义你的自定义前缀
          APP_NAME="ManagerAssistant"
          # 2. 获取当前的 Tag 标签名 (例如 v1.0)
          TAG_NAME="${{ github.ref_name }}"
          # 3. 执行重命名 (请确保路径与你实际生成的 APK 路径一致)
          # 通常默认路径是 app/build/outputs/apk/release/app-release.apk
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/${APP_NAME}_${TAG_NAME}.apk

      # 解析更新日志文件，然后填充到Release描述中
      - name: Extract Changelog
        id: extract_changelog
        run: |
          # 1. 获取当前推送的 Tag 名称 (例如 v1.0.0)
          VERSION="${{ github.ref_name }}"
          
          # 2. 找到文件中匹配 "# v1.0.0" 的行号
          # 注意：这里的 "^# $VERSION" 匹配以 # 开头且后面跟着版本号的行
          START_LINE=$(grep -nE "^# $VERSION" CHANGELOG.md | cut -d: -f1)
          
          if [ -z "$START_LINE" ]; then
            echo "未在 CHANGELOG.md 中找到版本 $VERSION 的记录"
            echo "No changelog found for $VERSION" > current_release_notes.md
          else
            # 3. 从起始行开始，提取内容，直到遇到下一个以 "# " 开头的版本行（不含该行）
            # tail 从起始行开始读取，sed 在遇到下一个 # 时停止输出
            tail -n +$((START_LINE + 1)) CHANGELOG.md | sed -n '/^# /q;p' > current_release_notes.md
          fi

      # 发布到 GitHub Release
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}  # 标题
          files: app/build/outputs/apk/release/*.apk
          body_path: current_release_notes.md   # 使用刚才提取出的临时文件作为 Release 正文
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}