pagingRxjava3 = "3.4.2"
roomRuntime = "2.8.4"
roomCompiler = "2.8.4"
rxjava = "3.1.12"
rxandroid = "3.0.2"
viewpager2 = "1.1.0"
swiperefreshlayout = "1.2.0"
