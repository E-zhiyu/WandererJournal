[versions]
agp = "9.2.1"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
gradle = "9.2.1"
appcompat = "1.7.1"
mapstruct = "1.6.3"
material = "1.14.0"
